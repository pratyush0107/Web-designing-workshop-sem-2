<!DOCTYPE html>
<head>
    <title>Document</title>
</head>
<body>
    <div class="container">
    <div class="box">
      <input id="name" class="in" placeholder="Employee Name" ><br>
      <input id="salary" class="in" placeholder="Salary"><br>
      <input id="empid" class="in" placeholder="Employee Id"><br>
      <input id="dept" class="in" placeholder="Department"><br>
      <button class="myBut" onclick="addemp()">Add Employee</button><br>
      <button class="myBut" onclick="display()">Display all</button>
      <button class="myBut" onclick="sal50()">Salary>50000</button>
      <button class="myBut" onclick="saltot()">Total Salary</button>
      <button class="myBut" onclick="salavg()">Average Salary</button><br>
      <button class="myBut" onclick="count()">Count Department</button>
      <button class="myBut" onclick="searchEmp()">Search Employee</button>
      <div id="output"></div>
    </div>
    </div>
</body>
</html>
<style>
body{
    background-color: hsl(210, 20%, 92%);
}

.box{
   width: 700px;
   height: auto;
   background-color: hsl(200, 60%, 88%);
   justify-content: center;
   text-align: center;
   border-radius: 30px;
   border: 2px solid hsl(210, 15%, 35%);
   box-shadow: 0 10px 20px hsl(210, 15%, 60%);
}

.container{
    display: flex;
    justify-content: center;
    margin-top: 60px;
}

.myBut{
     background-color: hsl(210, 80%, 35%);
     color: hsl(0, 0%, 100%);
     border-radius: 20px;
     cursor: pointer;
     margin-top: 10px;
     padding: 8px 16px;
}

.myBut:hover{
        background-color: hsl(210, 80%, 45%);
}

.myBut:active{
        background-color: hsl(210, 80%, 55%);
}

.in{
    margin-top: 10px;
    padding: 10px;
    font-size: 1.25rem;
    border-radius: 10px;
    border: 1px solid hsl(210, 15%, 60%);
    background-color: hsl(0, 0%, 100%);
}

button{
    font-size: 1.5rem;
}
</style>

<script>
    let employees=[];
function addemp(){
    let name1=document.getElementById("name").value;
    let salary1=document.getElementById("salary").value;
    let empid1=document.getElementById("empid").value;
    let dept1=document.getElementById("dept").value;
    if(name1==""||dept1==""||isNaN(salary1)||dept1==""){
        window.alert("Enter valid details");
        return;
    }
    else{
        let person={
        name:name1,
        salary:Number(salary1),
        empid:empid1,
        dept:dept1
    }
    window.alert("Details added successfully")
    employees.push(person);
    document.getElementById("name").value="";
    document.getElementById("salary").value="";
    document.getElementById("empid").value="";
    document.getElementById("dept").value="";
      
    }
}
function display(){
    let details="";
    for(emp of employees){
        details+="<h3>"+"Name="+emp.name+"||"+"Salary="+emp.salary+"||"+"ID="+emp.empid+"||"+"Department="+emp.dept+"</h3><br>";
    }
    document.getElementById("output").innerHTML=details;
}
function sal50(){
    let highSalary = employees.filter(emp => emp.salary > 50000);
    let details="";
    for(emp of highSalary){
        
            details+="<h3>"+"Name="+emp.name+"||"+"ID="+emp.empid+"||"+"Department="+emp.dept+"</h3><br>";
        
    }
    document.getElementById("output").innerHTML=details;
}
function saltot(){
    let total = employees.reduce((sum, emp) => sum + emp.salary, 0);
    document.getElementById("output").innerHTML="<h2>Total Salary="+total+"</h3>";
} 
function salavg(){
    let total = employees.reduce((sum, emp) => sum + emp.salary, 0);
    document.getElementById("output").innerHTML="<h2>Average Salary="+total/employees.length+"</h3>";

}
function count(){
    document.getElementById("output").innerHTML="<h2>Count="+employees.length+"</h3>";

}
function searchEmp(){
    let id = document.getElementById("empid").value;

    let emp = employees.find(e => e.empid == id);

    if(emp){
        document.getElementById("output").innerHTML =
        "<h3>Name="+emp.name+
        " || Salary="+emp.salary+
        " || ID="+emp.empid+
        " || Department="+emp.dept+"</h3>";
    }
    else{
        document.getElementById("output").innerHTML =
        "<h3>Employee not found</h3>";
    }
}
</script>
